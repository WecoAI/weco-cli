name: Bug report
description: Report a bug, regression, or broken workflow.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A short description of the bug.
    validations:
      required: true

  - type: dropdown
    id: report_mode
    attributes:
      label: Report source
      description: How was this bug discovered?
      options:
        - Human user
        - Coding agent / automation
        - Human + coding agent
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reliable reproduction.
      placeholder: |
        1. Run ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include CLI version, OS, Python version, model/provider, or any relevant context.
      placeholder: weco version, OS, shell, provider, model, etc.

  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or extra context
      description: Paste logs or add any extra details that will help triage.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched for an existing issue first.
          required: true
        - label: I can still reproduce this issue.
          required: false
